<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>إدارة الباقات - الحوثري نت</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
}

.header{
background:#0066cc;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
}

.cards{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.card{
background:white;
width:250px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ddd;
text-align:center;
}

.price{
font-size:25px;
color:#0066cc;
font-weight:bold;
}

button{
background:#008000;
color:white;
border:none;
padding:10px;
border-radius:5px;
}

</style>

</head>

<body>

<div class="header">
<h1>
إدارة باقات الإنترنت
</h1>
</div>


<div class="container">

<button>
+ إضافة باقة جديدة
</button>

<br><br>


<div class="cards">


<div class="card">
<h2>باقة 30 ألف</h2>
<p>الحجم: 90 جيجا</p>
<p>المدة: شهر</p>
<div class="price">
30000 ريال
</div>
</div>


<div class="card">
<h2>باقة مفتوحة</h2>
<p>السرعة: عالية</p>
<p>المدة: شهر</p>
<div class="price">
حسب الاشتراك
</div>
</div>


</div>

</div>

</body>

</html>
